<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso Date</title>
    <style>
        /* --- O VISUAL (CSS) --- */
        body {
            background-color: #d32f2f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background-color: #b71c1c;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .passo { display: none; }
        .ativo { display: block; }

        h2 { font-size: 22px; margin-bottom: 20px; }

        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: 0.2s;
        }

        .btn-primario {
            background-color: white;
            color: #d32f2f;
            width: 80%;
        }

        .btn-opcao {
            background-color: #e53935;
            color: white;
            width: 40%;
            margin: 5px;
        }

        .btn-opcao:hover, .btn-primario:hover {
            transform: scale(1.05);
        }

        #btn-nao {
            background-color: #333;
            color: white;
        }

        input[type="date"], input[type="time"] {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            width: 80%;
        }

        .resumo {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="tela1" class="passo ativo">
            <h2>Você aceitaria ir a um date comigo? 🥺</h2>
            <button id="btn-sim" onclick="irParaTela('tela2')">SIM</button>
            <button id="btn-nao">NÃO</button>
        </div>

        <div id="tela2" class="passo">
            <h2>🗓️ Quando você tá livre?</h2>
            <input type="date" id="input-data">
            <input type="time" id="input-hora">
            <br><br>
            <button class="btn-primario" onclick="salvarData()">Selecionar a Data ❤️</button>
        </div>

        <div id="tela3" class="passo">
            <h2>O que tá a fim? 🍔</h2>
            <button class="btn-opcao" onclick="salvarComida('Hambúrguer')">Hambúrguer</button>
            <button class="btn-opcao" onclick="salvarComida('Pastel')">Pastel</button>
            <button class="btn-opcao" onclick="salvarComida('Pizza')">Pizza</button>
            <button class="btn-opcao" onclick="salvarComida('Fondue')">Fondue</button>
        </div>

        <div id="tela4" class="passo">
            <h2>Qual vai ser a sobremesa? 🍨</h2>
            <button class="btn-opcao" onclick="salvarVibe('Sorvete')">Sorvete</button>
            <button class="btn-opcao" onclick="salvarVibe('Brownie')">Brownie</button>
            <button class="btn-opcao" onclick="salvarVibe('Açaí')">Açaí</button>
            <button class="btn-opcao" onclick="salvarVibe('Não quero mais comida')">Não aguento mais comer</button>
        </div>

        <div id="tela5" class="passo">
            <h2>Então tá combinado. 🐧🌹</h2>
            <p>Fica pronta que eu vou te buscar!</p>
            <div class="resumo">
                <p>📅 <strong>Data:</strong> <span id="resumo-data"></span> às <span id="resumo-hora"></span></p>
                <p>🍔 <strong>Comida:</strong> <span id="resumo-comida"></span></p>
                <p>🍨  <strong>Sobremesa:</strong> <span id="resumo-vibe"></span></p>
            </div>
        </div>

    </div>

    <script>
        /* --- A LÓGICA (JAVASCRIPT) --- */
        
        let dataEscolhida = "";
        let horaEscolhida = "";
        let comidaEscolhida = "";
        let vibeEscolhida = "";

        // Lógica Blindada do Botão Fujão
        const btnNao = document.getElementById('btn-nao');

        function fogeBotao(evento) {
            // Se for no celular, bloqueia o comportamento padrão para não virar um clique/zoom
            if (evento && evento.cancelable) {
                evento.preventDefault(); 
            }

            btnNao.style.position = 'fixed';
            
            // Margem de segurança de 20px para não sair da tela
            const maxLargura = window.innerWidth - btnNao.offsetWidth - 20; 
            const maxAltura = window.innerHeight - btnNao.offsetHeight - 20;
            
            const aleatorioX = Math.max(10, Math.floor(Math.random() * maxLargura));
            const aleatorioY = Math.max(10, Math.floor(Math.random() * maxAltura));

            btnNao.style.left = aleatorioX + 'px';
            btnNao.style.top = aleatorioY + 'px';
        }

        // Adiciona a fuga para mouse, primeiro toque no celular e clique de teimosia
        btnNao.addEventListener('mouseover', fogeBotao);
        btnNao.addEventListener('touchstart', fogeBotao, { passive: false });
        btnNao.addEventListener('click', fogeBotao);

        // A função do botão SIM que provavelmente havia sido apagada
        function irParaTela(idNovaTela) {
            const todasAsTelas = document.querySelectorAll('.passo');
            todasAsTelas.forEach(tela => {
                tela.classList.remove('ativo');
            });
            document.getElementById(idNovaTela).classList.add('ativo');
        }

        // Funções do restante das telas
        function salvarData() {
            dataEscolhida = document.getElementById('input-data').value;
            horaEscolhida = document.getElementById('input-hora').value;
            
            if(dataEscolhida === "" || horaEscolhida === "") {
                alert("Por favor, escolha uma data e horário!");
                return;
            }
            irParaTela('tela3');
        }

        function salvarComida(comida) {
            comidaEscolhida = comida;
            irParaTela('tela4');
        }

        function salvarVibe(vibe) {
            vibeEscolhida = vibe;
            
            document.getElementById('resumo-data').innerText = dataEscolhida;
            document.getElementById('resumo-hora').innerText = horaEscolhida;
            document.getElementById('resumo-comida').innerText = comidaEscolhida;
            document.getElementById('resumo-vibe').innerText = vibeEscolhida;
            
            irParaTela('tela5');
        }
    </script>

</body>
</html>
